<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Transcript</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="../flag-icons.min.css">
</head>
<body class="w-[342px] bg-[#FAFAFA] text-black font-dm border border-[#FFD32C]">
  <div id="app" class="p-4">

    <!-- Header -->
    <div class="flex items-center justify-between mb-5">
      <div class="flex items-center gap-2">
        <span class="text-lg font-extrabold tracking-tight">Mr. Transcript</span>
        <span class="bg-lime px-2 py-0.5 rounded-full text-[10px] font-bold uppercase">v1.0</span>
      </div>
      <img src="../icons/dancing48.png" alt="Mr. Transcript" class="w-[36px] h-[36px]" style="image-rendering: pixelated;">
    </div>

    <!-- YouTube URL -->
    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5 select-none">YouTube URL</label>
    <input
      id="input-url"
      type="text"
      placeholder="Paste your link hereeeeee"
      class="grass-input w-full"
    />

    <!-- Options (hidden until URL is entered) -->
    <div id="options-area" class="hidden">
      <!-- Language (custom dropdown) -->
      <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mt-3 mb-1.5 select-none">Language</label>
      <div id="dropdown" class="relative w-full">
        <button id="dropdown-trigger" type="button" class="grass-select w-full flex items-center justify-between text-left">
          <span id="dropdown-label" class="truncate flex items-center gap-2">Auto-detect</span>
          <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <input type="hidden" id="sel-language" value="auto">
        <div id="dropdown-menu" class="hidden mt-1 bg-white border-2 border-gray-200 rounded-xl shadow-lg max-h-[200px] overflow-y-auto py-[2px]">
          <!-- options injected by JS -->
        </div>
      </div>

      <!-- Format -->
      <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mt-3 mb-1.5 select-none">Format</label>
      <div class="flex gap-2">
        <label class="format-label flex items-center gap-1.5 text-xs font-semibold cursor-pointer" style="color:#495057">
          <input type="radio" name="format" value="txt" checked class="accent-[#FFD32C]"> TXT
        </label>
        <label class="format-label flex items-center gap-1.5 text-xs font-semibold cursor-pointer" style="color:#495057">
          <input type="radio" name="format" value="srt" class="accent-[#FFD32C]"> SRT
        </label>
        <label class="format-label flex items-center gap-1.5 text-xs font-semibold cursor-pointer" style="color:#495057">
          <input type="checkbox" id="chk-timestamps" class="accent-[#FFD32C]"> Timestamps
        </label>
      </div>
    </div>

    <!-- Download Button -->
    <button id="btn-download" class="w-full mt-4 text-xs inline-flex items-center justify-center rounded-full px-5 py-2 font-bold tracking-wider cursor-default bg-[#E5E7EB] text-[#6B7280]">DOWNLOAD TRANSCRIPT</button>

    <!-- Status -->
    <div id="status-area" class="mt-3 flex items-center gap-2 hidden">
      <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-lime animate-pulse"></div>
      <span id="status-text" class="text-[11px] font-semibold text-gray-400">Fetching transcript...</span>
    </div>

    <!-- Error -->
    <div id="error-area" class="mt-3 hidden">
      <div class="bg-red-50 border-2 border-red-200 rounded-2xl p-3 text-center">
        <p id="error-text" class="text-xs font-semibold text-red-500"></p>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast-popover" class="hidden fixed top-3 left-1/2 -translate-x-1/2 z-50 bg-black text-lime text-xs font-bold uppercase px-4 py-2 rounded-full shadow-hard tracking-wider">
      Done!
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
